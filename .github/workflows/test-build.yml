name: Test Build

on:
  workflow_dispatch: # manually

  push:
    branches-ignore:
      - master
    
    paths:
      - '**.c*' ## .c and .cpp
      - '**.h*' ## .h and .hpp
      - '**.def'
      - '**.lib'
      - '**.rc'
      - '**.vcproj'
      - '**.vcxproj.filters'
      - '**.sln'
      - '**.yml'

permissions:
  contents: read

jobs:
  Test_Build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: "recursive"

      - name: Set up MsBuild
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce # v2.0.0

      - name: Tag with current commit SHA
        id: custom_build
        run: node.exe .github/workflows/tag-custom-build.js

      - name: Core - Build
        shell: cmd
        run: |
          @echo off
          set PLUGIN_SDK_DIR=%GITHUB_WORKSPACE%\third-party\plugin-sdk
          msbuild build/III.VC.CLEO.sln /target:III.CLEO /property:Platform=Win32 /property:Configuration=Release /m /verbosity:minimal /fileLogger1 /fileLoggerParameters1:warningsOnly;errorsOnly;logfile=output.log
          node .github/workflows/analyze-build-log.js "III Core compilation"

      - name: Upload Result III
        id: upload
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          compression-level: 9
          include-hidden-files: true
          name: III.CLEO-v${{steps.custom_build.outputs.version}}-${{steps.custom_build.outputs.sha}}
          path: |
            bin\III*
            !bin\*.pdb
            !bin\*.lib
            !bin\*.exp

      - name: Log download link
        run: echo "::notice title=Download this build III::${{steps.upload.outputs.artifact-url}}"
